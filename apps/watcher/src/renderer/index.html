<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>VibePing</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app-shell__glow app-shell__glow--left"></div>
      <div class="app-shell__glow app-shell__glow--right"></div>

      <header class="hero">
        <div class="hero__header">
          <div>
            <p class="eyebrow">Discord coding presence</p>
            <h1>Vibe-Ping</h1>
            <p class="hero-copy">
              Notify your homies when you're vibe coding via Discord.
            </p>
          </div>

          <div class="hero__identity">
            <button id="username-display" class="username-chip" type="button">
              @anonomous0123
            </button>
            <input
              id="username-input"
              class="username-input is-hidden"
              type="text"
              maxlength="24"
              value="anonomous0123"
              aria-label="Username"
            />
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="panel panel--folders">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow">Watched folders</p>
              <h2>Folder list</h2>
            </div>

            <div class="panel__actions">
              <button id="add-folder-button" class="button button--primary" type="button">
                Add
              </button>
              <button id="remove-folder-button" class="button button--secondary" type="button">
                Remove
              </button>
            </div>
          </div>

          <ul id="folder-list" class="folder-list" aria-label="Watched folders"></ul>
        </section>

        <section class="panel panel--settings">
          <div class="panel__header panel__header--stacked">
            <div>
              <p class="panel__eyebrow">Discord</p>
              <h2>Connections</h2>
            </div>
          </div>

          <div id="webhook-editor" class="discord-editor">
            <p class="discord-step__copy">
              Paste the Discord webhook URL to send coding updates into your server.
            </p>

            <label class="timeout-control" for="webhook-input">
              <span>Webhook URL</span>
              <input
                id="webhook-input"
                type="password"
                placeholder="https://discord.com/api/webhooks/..."
                autocomplete="off"
              />
            </label>

            <p id="webhook-validation-message" class="webhook-validation-message"></p>
          </div>
        </section>

        <section class="panel panel--activity">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow">Recent activity</p>
              <h2>Latest events</h2>
            </div>
          </div>

          <ul id="activity-list" class="activity-list" aria-label="Recent activity"></ul>
        </section>
      </main>

      <footer class="footer">
        <span id="runtime-badge"></span>
      </footer>
    </div>

    <script type="module" src="../../dist/renderer/renderer.js"></script>
  </body>
</html>
